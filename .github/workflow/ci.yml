name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: mnemosyne
          POSTGRES_PASSWORD: mnemosyne
          POSTGRES_DB: mnemosyne
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run linting
        run: |
          flake8 mnemosyne/ tests/
          mypy mnemosyne/

      - name: Run unit tests
        run: pytest tests/ -v -m "not integration" --cov=mnemosyne --cov-report=xml

      - name: Run integration tests
        env:
          MEMORY_DB_DSN: "postgresql://mnemosyne:mnemosyne@localhost:5432/mnemosyne"
        run: pytest tests/ -v -m integration

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
